name: Buildpacks Docker Image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Loga no GitHub Container Registry
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Instala a ferramenta 'pack' dos Buildpacks
      - name: Setup pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      # Constrói e publica a imagem magicamente sem Dockerfile
      - name: Build and Publish with Buildpacks
        run: |
          pack build ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --builder paketobuildpacks/builder-jammy-base \
            --publish
