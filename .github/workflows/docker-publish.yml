name: Buildpacks Docker Image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NOVO PASSO AQUI ---
      # Pega o nome do repositório, converte para minúsculas e salva na variável IMAGE_NAME
      - name: Formatar nome da imagem para minúsculas
        run: |
          echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Loga no GitHub Container Registry
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Instala a ferramenta 'pack' dos Buildpacks
      - name: Setup pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.0.0

      # Constrói e publica a imagem (agora usando a variável minúscula)
      - name: Build and Publish with Buildpacks
        run: |
          pack build ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --builder paketobuildpacks/builder-jammy-base \
            --publish
