apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: preview-env-sample
  labels:
    app.kubernetes.io/name: sample-app
    orbitdesktop.io/environment-id: env-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        orbitdesktop.io/environment-id: env-sample
    spec:
      containers:
        - name: web
          image: ghcr.io/example/orbitdesktop-sample:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sample-app-db
                  key: database-url
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

